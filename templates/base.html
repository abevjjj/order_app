<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>{% block title %}订货系统{% endblock %}</title>
<style>
:root {
  --bg: #f5f4f0; --card: #ffffff; --primary: #2d5a27; --primary-light: #e8f0e7;
  --accent: #e07b39; --text: #1a1a1a; --text-sub: #666; --border: #e0ddd8;
  --danger: #c0392b; --radius: 10px; --nav-h: 56px; --bottom-h: 64px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; }
.nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: var(--primary);
  display: flex; align-items: center; padding: 0 16px; z-index: 100; }
.nav-title { color: #fff; font-size: 17px; font-weight: 600; flex: 1; }
.nav-actions { display: flex; gap: 8px; }
.nav-btn { background: rgba(255,255,255,.18); color: #fff; border: none; border-radius: 6px;
  padding: 6px 12px; font-size: 13px; cursor: pointer; }
.nav-btn:active { background: rgba(255,255,255,.32); }
.tabs { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-h);
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; color: var(--text-sub); font-size: 11px;
  text-decoration: none; transition: color .15s; }
.tab.active { color: var(--primary); }
.tab svg { width: 22px; height: 22px; }
.page { margin-top: var(--nav-h); margin-bottom: var(--bottom-h); padding: 12px; }
.card { background: var(--card); border-radius: var(--radius); padding: 14px;
  margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  border: none; border-radius: 8px; padding: 10px 18px; font-size: 15px;
  font-weight: 500; cursor: pointer; transition: opacity .15s; }
.btn:active { opacity: .75; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-accent  { background: var(--accent);  color: #fff; }
.btn-ghost   { background: var(--primary-light); color: var(--primary); }
.btn-danger  { background: var(--danger);  color: #fff; }
.btn-full    { width: 100%; }
.btn-sm      { padding: 6px 12px; font-size: 13px; }
.badge { background: var(--accent); color: #fff; border-radius: 10px;
  font-size: 11px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center; }
#toast { position: fixed; bottom: calc(var(--bottom-h) + 16px); left: 50%;
  transform: translateX(-50%) translateY(20px); background: #333; color: #fff;
  border-radius: 20px; padding: 8px 18px; font-size: 14px; opacity: 0;
  transition: all .25s; z-index: 999; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
  display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s; }
.overlay.open { opacity: 1; pointer-events: auto; }
.modal { background: var(--card); border-radius: 16px 16px 0 0; padding: 20px 16px;
  width: 100%; transform: translateY(40px); transition: transform .25s; max-height: 80vh; overflow-y: auto; }
.overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; display: block; }
.form-input { width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 15px; background: var(--bg); color: var(--text); }
.form-input:focus { outline: none; border-color: var(--primary); }
.sec-title { font-size: 12px; color: var(--text-sub); font-weight: 600;
  letter-spacing: .5px; margin: 16px 0 8px; text-transform: uppercase; }
.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 32px; height: 32px; border-radius: 8px; border: none;
  background: var(--primary-light); color: var(--primary); font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-btn:active { background: var(--primary); color: #fff; }
.qty-input { width: 52px; text-align: center; border: 1px solid var(--border);
  border-radius: 6px; padding: 4px; font-size: 15px; background: var(--card); }
/* cart badge dot */
.cart-tab-wrap { position: relative; }
#cart-badge { position: absolute; top: -2px; right: -4px; background: var(--accent);
  color: #fff; border-radius: 9px; font-size: 10px; font-weight: 700;
  padding: 1px 5px; min-width: 16px; text-align: center; display: none; }
</style>
</head>
<body>
<div class="nav">
  <span class="nav-title">{% block nav_title %}订货{% endblock %}</span>
  <div class="nav-actions">{% block nav_actions %}{% endblock %}</div>
</div>

{% block content %}{% endblock %}

<nav class="tabs">
  <a href="/" class="tab {% if request.path == '/' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    <span>快速</span>
  </a>
  <a href="/category" class="tab {% if request.path == '/category' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>分类</span>
  </a>
  <a href="/cart" class="tab {% if request.path == '/cart' %}active{% endif %}">
    <div class="cart-tab-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="cart-badge"></span>
    </div>
    <span>购物车</span>
  </a>
  <a href="/orders" class="tab {% if request.path == '/orders' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span>记录</span>
  </a>
  <a href="/admin" class="tab {% if request.path.startswith('/admin') %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
    </svg>
    <span>管理</span>
  </a>
</nav>

<div id="toast"></div>

<script>
// ── Shared cart polling ──────────────────────────────────────────────────────
let _cartVersion = -1;
let _cartItems   = [];

async function fetchCart() {
  try {
    const r = await fetch('/api/cart');
    const data = await r.json();
    if (data.version !== _cartVersion) {
      _cartVersion = data.version;
      _cartItems   = data.items || [];
      updateCartBadge();
      if (typeof onCartUpdate === 'function') onCartUpdate(_cartItems);
    }
  } catch(e) {}
}

function updateCartBadge() {
  const badge = document.getElementById('cart-badge');
  if (!badge) return;
  const n = _cartItems.length;
  if (n > 0) { badge.textContent = n; badge.style.display = ''; }
  else        { badge.style.display = 'none'; }
}

async function addToCartAPI(product, qty) {
  qty = qty || 1;
  const r = await fetch('/api/cart/add', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: product.name, category: product.category||'未分类',
                           unit: product.unit||'', qty })
  });
  const data = await r.json();
  if (data.ok) {
    // 直接用服务端返回的完整购物车更新本地状态，不走 fetchCart
    // 避免"先设版本号再fetch"导致 onCartUpdate 不触发的问题
    const r2 = await fetch('/api/cart');
    const cart = await r2.json();
    _cartVersion = cart.version;
    _cartItems   = cart.items || [];
    updateCartBadge();
    if (typeof onCartUpdate === 'function') onCartUpdate(_cartItems);
    showToast('已加入：' + product.name);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

// initial fetch + poll every 800ms
fetchCart();
setInterval(fetchCart, 800);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
